<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prateek Kumar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Madimi+One&family=Playfair+Display:ital@1&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <img class="hasburger" src="klipartz.com.png" >
        <div class="sidebar">
            <div class="menu">
            </div>
            <nav>
                <ul>
                    <li><a class="pages" href="index.html">Home</a></li>
                    <li><a class="pages" href="intro.html">My Intro</a></li>
                    <li><a class="pages" href="services.html">Services</a></li>
                    <li><a class="pages" href="Project.html">Project</a></li>
                    <li><a class="pages" href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
        <div class="main">
            <div class="contactForm">
                <h2>"Feel free to reach out to me with any inquiries, collaborations, or just to say hello!"</h2>
                <form>
                    <div class="mb-3">
                        <label for="name" class="form-label bar">Name</label>
                        <input type="name" class="form-control" id="exampleInputName" aria-describedby="Name">
                    </div>
                    <div class="mb-3">
                        <label for="clintmail" class="form-label bar">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <div class="mb-3">
                        <label for="clintphone" class="form-label bar">Phone</label>
                        <input type="number" class="form-control" id="clintphone">
                    </div>
                    <div class="mb-3 form-check">
                        <div class="check-box">
                            <input type="checkbox" class="check-input" id="exampleCheck1">
                        </div>
                        <label class="form-check-label" for="isclint">I want to work on project with you.</label>

                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
